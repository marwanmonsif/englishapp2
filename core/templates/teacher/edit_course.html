{% extends "shared/base.html" %}
{% block title %}Edit Course{% endblock %}
{% block page_title %}Edit Course{% endblock %}
{% block content %}
<div class="breadcrumb">
  <a href="{{ url_for('teacher.courses') }}">Courses</a>
  <i class="fas fa-chevron-right" style="font-size:11px"></i>
  <a href="{{ url_for('teacher.course_detail', course_id=course.id) }}">{{ course.title }}</a>
  <i class="fas fa-chevron-right" style="font-size:11px"></i>
  <span>Edit</span>
</div>
<div class="card" style="max-width:600px">
  <div class="card-header"><div class="card-title">Edit Course</div></div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Course Title *</label>
        <input type="text" name="title" class="form-control" value="{{ course.title }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Grade *</label>
        <select name="grade_id" class="form-control" required>
          {% for grade in grades %}
          <option value="{{ grade.id }}" {{ 'selected' if grade.id == course.grade_id }}>{{ grade.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control">{{ course.description or '' }}</textarea>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px">
        <input type="checkbox" name="is_published" id="pub" {{ 'checked' if course.is_published }}>
        <label for="pub" style="font-weight:500;cursor:pointer">Published (visible to students)</label>
      </div>
      <div style="display:flex;gap:10px">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
        <a href="{{ url_for('teacher.course_detail', course_id=course.id) }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
